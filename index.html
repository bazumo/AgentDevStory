<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentDevStory</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="phaser-root"></div>

      <aside id="task-list-panel">
        <header class="task-list-header">
          <button
            class="task-list-toggle"
            type="button"
            aria-label="Toggle sessions panel"
            aria-expanded="true"
          >«</button>
          <span class="task-list-title">Sessions</span>
          <span class="task-list-count" data-bind="count">0</span>
        </header>
        <div class="task-list-items" data-bind="items">
          <div class="task-list-empty">
            <p class="empty-msg">no sessions yet — spawn one with + New Task</p>
            <div class="empty-divider"><span>or connect</span></div>
            <div class="integration-list">
              <button class="integration-btn" type="button" data-svc="linear">
                <span class="integration-dot" style="--svc:#5E6AD2"></span>
                <span class="integration-name">Linear</span>
                <span class="integration-arrow">›</span>
              </button>
              <button class="integration-btn" type="button" data-svc="trello">
                <span class="integration-dot" style="--svc:#0079BF"></span>
                <span class="integration-name">Trello</span>
                <span class="integration-arrow">›</span>
              </button>
              <button class="integration-btn" type="button" data-svc="jira">
                <span class="integration-dot" style="--svc:#2684FF"></span>
                <span class="integration-name">Jira</span>
                <span class="integration-arrow">›</span>
              </button>
              <button class="integration-btn" type="button" data-svc="github">
                <span class="integration-dot" style="--svc:#c9d1d9"></span>
                <span class="integration-name">GitHub Issues</span>
                <span class="integration-arrow">›</span>
              </button>
              <button class="integration-btn" type="button" data-svc="asana">
                <span class="integration-dot" style="--svc:#F06A6A"></span>
                <span class="integration-name">Asana</span>
                <span class="integration-arrow">›</span>
              </button>
              <button class="integration-btn" type="button" data-svc="notion">
                <span class="integration-dot" style="--svc:#e6e6e6"></span>
                <span class="integration-name">Notion</span>
                <span class="integration-arrow">›</span>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <header id="topbar">
        <span class="brand">AgentDevStory</span>
        <button id="new-task-btn" type="button">+ New Task</button>
      </header>

      <div id="new-task-modal" aria-hidden="true">
        <form class="new-task-form">
          <label for="new-task-input">New session prompt</label>
          <input
            id="new-task-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="e.g. build login form, debug auth bug, write README..."
          />
          <div class="new-task-buttons">
            <button type="button" id="new-task-cancel">cancel</button>
            <button type="submit" id="new-task-submit">spawn room</button>
          </div>
        </form>
      </div>

      <aside id="terminal-panel" aria-hidden="true">
        <header class="terminal-header">
          <span class="terminal-title" data-bind="roomLabel">—</span>
          <button id="terminal-close" type="button">×</button>
        </header>
        <div class="terminal-log" data-bind="log"></div>
        <form class="terminal-form">
          <span class="terminal-prompt">&gt;</span>
          <input
            id="terminal-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="type a prompt, or ! for shell"
          />
        </form>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
